<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArgusML — Live Threat Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid #ff4444;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 20px #ff444466;
            letter-spacing: 2px;
        }

        .logo span {
            color: #ffffff;
        }

        .tagline {
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #00ff88;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .clock {
            font-size: 13px;
            color: #888;
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: #1a1a2e;
            border-bottom: 1px solid #222;
        }

        .stat-item {
            background: #0d1117;
            padding: 15px 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 10px #ff444444;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        /* Services */
        .service-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .service-dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .service-dot.offline { background: #ff4444; box-shadow: 0 0 6px #ff4444; }

        /* Main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: 450px 1fr;
            gap: 1px;
            background: #111;
            height: calc(100vh - 120px);
        }

        .panel {
            background: #0d1117;
            padding: 20px;
            overflow: hidden;
        }

        .panel-title {
            font-size: 11px;
            color: #ff4444;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a2e;
            padding-bottom: 8px;
        }

        /* Map */
        #map {
            width: 100%;
            height: calc(100% - 35px);
            border-radius: 4px;
            filter: brightness(0.8) saturate(0.7);
        }

        .leaflet-container {
            background: #0a0a14 !important;
        }

        /* Threat feed */
        .threat-feed {
            height: calc(100% - 35px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 #0d1117;
        }

        .threat-item {
            background: #111827;
            border-left: 3px solid #ff4444;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 0 4px 4px 0;
            animation: slideIn 0.3s ease;
        }

        .threat-item.severity-1 { border-left-color: #ff0000; }
        .threat-item.severity-2 { border-left-color: #ff6600; }
        .threat-item.severity-3 { border-left-color: #ffaa00; }
        .threat-item.severity-4 { border-left-color: #ffff00; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .threat-label {
            font-size: 12px;
            font-weight: bold;
            color: #ff4444;
        }

        .threat-confidence {
            font-size: 11px;
            color: #00ff88;
            float: right;
        }

        .threat-time {
            font-size: 10px;
            color: #555;
            margin-top: 3px;
        }

        .threat-explanation {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            line-height: 1.4;
        }

        .threat-geo {
            font-size: 10px;
            color: #4488ff;
            margin-top: 3px;
        }

        /* Chart panel */
        .chart-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .chart-container {
            background: #0d1117;
            padding: 20px;
            flex: 1;
        }

        /* Rules panel */
        .rules-panel {
            grid-column: 1;
            grid-row: 2;
            overflow-y: auto;
        }

        .rule-item {
            background: #111827;
            border-left: 3px solid #4488ff;
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 0 4px 4px 0;
            font-size: 10px;
            color: #88aaff;
            word-break: break-all;
            line-height: 1.5;
        }

        /* Services panel */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .service-item {
            background: #111827;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* Attack line animation */
        .attack-flash {
            animation: flash 0.5s ease;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <div>
            <div class="logo">ARGUS<span>ML</span> 👁️</div>
            <div class="tagline">AUTONOMOUS ML-POWERED INTRUSION DETECTION & PREVENTION SYSTEM</div>
        </div>
    </div>
    <div class="header-right">
        <div class="live-indicator">
            <div class="live-dot"></div>
            LIVE
        </div>
        <div class="clock" id="clock"></div>
    </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
    <div class="stat-item">
        <div class="stat-value" id="total-detections">0</div>
        <div class="stat-label">TOTAL DETECTIONS</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="total-rules">0</div>
        <div class="stat-label">RULES GENERATED</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" style="color:#00ff88">98.04%</div>
        <div class="stat-label">MODEL ACCURACY</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="active-threats">0</div>
        <div class="stat-label">ACTIVE THREATS</div>
    </div>
    <div class="stat-item">
        <div class="stat-value" id="services-status" style="color:#00ff88">--</div>
        <div class="stat-label">SERVICES ONLINE</div>
    </div>
</div>

<!-- Main Grid -->
<div class="main-grid">

    <!-- World Map -->
    <div class="panel">
        <div class="panel-title">🌍 LIVE ATTACK ORIGINS</div>
        <div id="map"></div>
    </div>

    <!-- Right Column -->
    <div class="chart-panel">
        <!-- Threat Chart -->
        <div class="chart-container">
            <div class="panel-title">📊 THREAT DISTRIBUTION</div>
            <canvas id="threatChart"></canvas>
        </div>

        <!-- Services -->
        <div class="chart-container">
            <div class="panel-title">⚡ SYSTEM STATUS</div>
            <div class="services-grid" id="services-grid"></div>
        </div>

        <!-- Threat Feed -->
        <div class="chart-container" style="flex:2; overflow:hidden;">
            <div class="panel-title">🚨 LIVE THREAT FEED</div>
            <div class="threat-feed" id="threat-feed"></div>
        </div>
    </div>

    <!-- Rules Panel -->
    <div class="panel rules-panel">
        <div class="panel-title">📋 ARGUS-ML GENERATED RULES</div>
        <div id="rules-list"></div>
    </div>

</div>

<script>
    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toUTCString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Map setup
    const map = L.map('map', {
        center: [20, 0],
        zoom: 2,
        zoomControl: true,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
    }).addTo(map);

    // Your location (Keenesburg, CO)
    const HOME_LAT = 40.1;
    const HOME_LON = -104.5;

    // Home marker
    const homeIcon = L.divIcon({
        html: '<div style="width:12px;height:12px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;border:2px solid #fff;"></div>',
        iconSize: [12, 12],
        className: ''
    });
    L.marker([HOME_LAT, HOME_LON], {icon: homeIcon})
        .addTo(map)
        .bindPopup('<b style="color:#00ff88">ArgusML Sensor</b><br>Keenesburg, CO');

    // Attack markers and lines
    const attackMarkers = [];
    const attackLines = [];

    function addAttackToMap(geo, label, confidence) {
        if (!geo || !geo.lat || !geo.lon) return;

        // Red attack marker
        const attackIcon = L.divIcon({
            html: `<div style="width:10px;height:10px;background:#ff4444;border-radius:50%;box-shadow:0 0 15px #ff4444;animation:pulse 1s infinite;"></div>`,
            iconSize: [10, 10],
            className: ''
        });

        const marker = L.marker([geo.lat, geo.lon], {icon: attackIcon})
            .addTo(map)
            .bindPopup(`
                <b style="color:#ff4444">${label.replace('_', ' ').toUpperCase()}</b><br>
                📍 ${geo.city}, ${geo.country}<br>
                🌐 ${geo.ip}<br>
                💯 ${(confidence * 100).toFixed(1)}% confidence
            `);

        // Animated attack line
        const line = L.polyline(
            [[geo.lat, geo.lon], [HOME_LAT, HOME_LON]],
            {color: '#ff4444', weight: 1, opacity: 0.6, dashArray: '5, 10'}
        ).addTo(map);

        attackMarkers.push(marker);
        attackLines.push(line);

        // Remove old markers if too many
        if (attackMarkers.length > 20) {
            map.removeLayer(attackMarkers.shift());
            map.removeLayer(attackLines.shift());
        }
    }

    // Threat Chart
    const chartCtx = document.getElementById('threatChart').getContext('2d');
    const threatChart = new Chart(chartCtx, {
        type: 'doughnut',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [
                    '#ff4444', '#ff6600', '#ffaa00',
                    '#ff00ff', '#4488ff', '#00ffaa'
                ],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    labels: { color: '#888', font: { size: 10 } }
                }
            }
        }
    });

    // Socket.IO
    const socket = io();

    socket.on('connect', () => {
        console.log('Connected to ArgusML dashboard');
    });

    socket.on('stats_update', (data) => {
        updateStats(data);
    });

    socket.on('new_detection', (detection) => {
        addThreatToFeed(detection);
        if (detection.geo) {
            addAttackToMap(
                detection.geo,
                detection.fused_label,
                detection.fused_confidence
            );
        }
        // Update active threats counter
        const counter = document.getElementById('active-threats');
        counter.textContent = parseInt(counter.textContent || 0) + 1;
        counter.classList.add('attack-flash');
        setTimeout(() => counter.classList.remove('attack-flash'), 500);
    });

    function updateStats(data) {
        // Total detections
        document.getElementById('total-detections').textContent =
            data.total_detections || 0;

        // Rules
        document.getElementById('total-rules').textContent =
            (data.rules || []).length;

        // Services
        const services = data.services || {};
        const online = Object.values(services).filter(Boolean).length;
        const total = Object.keys(services).length;
        document.getElementById('services-status').textContent =
            `${online}/${total}`;

        // Services grid
        const servicesGrid = document.getElementById('services-grid');
        servicesGrid.innerHTML = '';
        const serviceNames = {
            'suricata': 'Suricata',
            'argus_ml': 'ArgusML',
            'suricata_fusion': 'ML Fusion',
            'evebox': 'EveBox'
        };
        for (const [key, status] of Object.entries(services)) {
            servicesGrid.innerHTML += `
                <div class="service-item">
                    <span class="service-dot ${status ? 'online' : 'offline'}"></span>
                    ${serviceNames[key] || key}
                </div>
            `;
        }

        // Threat chart
        const stats = data.threat_stats || {};
        threatChart.data.labels = Object.keys(stats).map(k =>
            k.replace('_activity', '').replace('_', ' ').toUpperCase()
        );
        threatChart.data.datasets[0].data = Object.values(stats);
        threatChart.update();

        // Rules list
        const rulesList = document.getElementById('rules-list');
        rulesList.innerHTML = '';
        (data.rules || []).forEach(rule => {
            const msgMatch = rule.match(/msg:"([^"]+)"/);
            const sidMatch = rule.match(/sid:(\d+)/);
            const confMatch = rule.match(/cf_confidence ([0-9.]+)/);
            rulesList.innerHTML += `
                <div class="rule-item">
                    <b style="color:#88aaff">${msgMatch ? msgMatch[1] : 'Unknown'}</b><br>
                    SID: ${sidMatch ? sidMatch[1] : '?'} |
                    Confidence: ${confMatch ? (parseFloat(confMatch[1]) * 100).toFixed(1) + '%' : '?'}
                </div>
            `;
        });

        // Recent alerts on map
        (data.recent_alerts || []).forEach(alert => {
            if (alert.src_ip) {
                fetch(`/api/geolocate/${alert.src_ip}`)
                    .then(r => r.json())
                    .then(geo => {
                        if (geo.lat) {
                            addAttackToMap(geo, 'alert', 0.9);
                        }
                    }).catch(() => {});
            }
        });
    }

    function addThreatToFeed(detection) {
        const feed = document.getElementById('threat-feed');
        const severity = detection.fused_confidence > 0.9 ? 1 :
                        detection.fused_confidence > 0.8 ? 2 :
                        detection.fused_confidence > 0.7 ? 3 : 4;

        const label = (detection.fused_label || 'unknown')
            .replace('_activity', '')
            .replace('_', ' ')
            .toUpperCase();

        const confidence = ((detection.fused_confidence || 0) * 100).toFixed(1);
        const time = detection.timestamp ?
            detection.timestamp.substring(11, 19) : '--:--:--';
        const explanation = detection.explanation || '';
        const geo = detection.geo;

        const item = document.createElement('div');
        item.className = `threat-item severity-${severity}`;
        item.innerHTML = `
            <span class="threat-label">${label}</span>
            <span class="threat-confidence">${confidence}%</span>
            <div class="threat-time">${time}</div>
            ${geo ? `<div class="threat-geo">📍 ${geo.city}, ${geo.country} (${geo.ip})</div>` : ''}
            <div class="threat-explanation">${explanation.substring(0, 150)}</div>
        `;

        feed.insertBefore(item, feed.firstChild);

        // Keep feed clean
        while (feed.children.length > 50) {
            feed.removeChild(feed.lastChild);
        }
    }

    // Refresh stats every 10 seconds
    setInterval(() => {
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => updateStats(data));
    }, 10000);
</script>
</body>
</html>
